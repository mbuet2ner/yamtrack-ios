            - $ref: "#/components/schemas/TVDetails"
        related:
          oneOf:
            - $ref: "#/components/schemas/AnimeRelated"
            - $ref: "#/components/schemas/BoardGameRelated"
            - $ref: "#/components/schemas/BookRelated"
            - $ref: "#/components/schemas/ComicRelated"
            - $ref: "#/components/schemas/EpisodeRelated"
            - $ref: "#/components/schemas/GameRelated"
            - $ref: "#/components/schemas/MangaRelated"
            - $ref: "#/components/schemas/MovieRelated"
            - $ref: "#/components/schemas/SeasonRelated"
            - $ref: "#/components/schemas/TVRelated"
        item_id:
          $ref: "#/components/schemas/ItemId"
        parent_id:
          $ref: "#/components/schemas/ItemId"
          description: If the Item is a Season or an Episode, the parent_id is the id of the Serie or of the Season
        tracked:
          type: boolean
          description: If the current media is being tracked by Yamtrack
        consumptions_number:
          type: integer
          description: Number of times the media has been watched/tracked
        consumptions:
          type: array
          items:
            $ref: "#/components/schemas/ConsumptionInfos"
        lists:
          $ref: "#/components/schemas/ListsMinimized"
    ConsumptionInfos:
      type: object
