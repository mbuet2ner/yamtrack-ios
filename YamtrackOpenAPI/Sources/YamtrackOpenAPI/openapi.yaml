          schema:
            type: integer
        - in: path
          name: episode_number
          required: true
          schema:
            type: integer
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListsMinimized"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/media/{media_type}/{source}/{media_id}/{season_number}/{episode_number}/sync/:
    post:
      tags:
        - media
      summary: Sync season metadata from provider (non-manual sources). Redirects to the parent season sync.
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: source
          required: true
          schema:
            $ref: "#/components/schemas/Source"
        - in: path
          name: media_id
          required: true
          schema:
            type: string
        - in: path
          name: season_number
          required: true
          schema:
            type: integer
        - in: path
          name: episode_number
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Sync triggered
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/search/{media_type}/:
    get:
      tags:
        - search
      summary: Search for media items across supported providers
      parameters:
        - in: path
          name: media_type
          schema:
            $ref: "#/components/schemas/MediaTypes"
          description: Media type to search for
          required: true
        - in: query
          name: search
          required: true
          schema:
            type: string
          description: Search query string
        - in: query
          name: source
          schema:
            $ref: "#/components/schemas/Source"
          description: The specific source of the media type to query
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSearch"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/statistics/:
    get:
      tags:
        - statistics
      summary: Get statistics for the authenticated user
      parameters:
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: Filter media ended before this date (YYYY-MM-DD)
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: Filter media started after this date (YYYY-MM-DD)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AnimeDetails:
      # TODO: missing fields
      type: object
      nullable: true
    AnimeRelated:
      # TODO: missing fields
      type: object
      nullable: true
    BasicResponse:
      type: object
      properties:
        detail:
          type: string
          description: The detail message of the response
    BoardGameDetails:
      type: object
      properties:
        year:
          type: integer
        players:
          type: array
          items:
            type: integer
        playtime:
          type: integer
        min_age:
          type: integer
        designers:
          type: array
          items:
            type: string
        publishers:
          type: array
          items:
            type: string
    BoardGameRelated:
      type: object
      nullable: true
    BookDetails:
      type: object
      properties:
        format:
          type: string
        number_of_pages:
          type: integer
        publish_date:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
        author:
          type: string
        publisher:
          type: string
        isbn:
          type: string
    BookRelated:
      type: object
      nullable: true
    CalendarEvent:
      type: object
      description: The calendar event
      properties:
        id:
          type: integer
        item:
          $ref: "#/components/schemas/Item"
        item_id:
          $ref: "#/components/schemas/ItemId"
        parent_id:
          $ref: "#/components/schemas/ItemId"
        content_number:
          type: integer
        datetime:
          type: string
          format: date-time
        notification_sent:
          type: boolean
    ChangesHistoryRecord:
      type: object
      properties:
        id:
          type: integer
          description: The changes history change id
        item_id:
          $ref: "#/components/schemas/ItemId"
          description: The id of the media item
        timestamp:
          type: string
          format: date-time
        changes:
          type: array
          description: List of changes done at specified timestamp
          items:
            type: object
            properties:
              field:
                type: string
                description: The media field changed
                enum:
                  - end_date
                  - notes
                  - progress
                  - score
                  - start_date
                  - status
              old_value:
                type: string
                description: The value before the change
                nullable: true
              new_value:
                type: string
                description: The value after the change
                nullable: true
    ComicDetails:
      type: object
      properties:
        start_date:
          type: string
          format: year
        publisher:
          type: string
        issues_count:
          type: integer
        last_issue_name:
          type: string
        last_issue_number:
          type: integer
        people:
          type: array
          items:
            type: string
        last_updated:
          type: string
          format: date
          description: Date in YYYY-MM-DD format
        last_issue_id:
          type: integer
    ComicRelated:
      type: object
      nullable: true
      properties:
        from_the_same_publisher:
          type: array
          items:
            type: object
            properties:
              media_id:
                type: string
              source:
                type: string
              media_type:
                type: string
              title:
                type: string
              image:
                type: string
                format: uri
    CompleteList:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        description:
          type: string
        image:
          type: string
          format: uri
        owner:
          type: object
          properties:
            id:
              type: number
              description: The id of the user of the owner
            username:
              type: string
        collaborators:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
                description: The id of the user of the collaborator
              username:
                type: string
        items_count:
          type: number
        latest_update:
          type: string
          format: timestamp
        items:
          $ref: "#/components/schemas/PaginatedMedia"
    CompleteMedia:
      type: object
      properties:
        id:
          type: integer
          description: The id of the item in the database (not to be confused with the item_id, which is media provider specific)
        media_id:
          type: string
        source:
          type: string
        source_url:
          type: string
          format: uri
        media_type:
          $ref: "#/components/schemas/MediaTypesComplete"
        title:
          type: string
        max_progress:
          type: integer
        image:
          type: string
          format: uri
        synopsis:
          type: string
        genres:
          type: array
          items:
            type: string
        score:
          type: number
          format: float
        score_count:
          type: integer
        details:
          oneOf:
            - $ref: "#/components/schemas/AnimeDetails"
            - $ref: "#/components/schemas/BoardGameDetails"
            - $ref: "#/components/schemas/BookDetails"
            - $ref: "#/components/schemas/ComicDetails"
            - $ref: "#/components/schemas/EpisodeDetails"
