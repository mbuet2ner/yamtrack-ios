openapi: 3.0.4
info:
  title: Yamtrack API
  version: 0.0.25
  description: Initial API for Yamtrack.
servers:
  - url: http://localhost:8000
    description: Local development server
security:
  - ApiKeyAuth: []
  - bearerAuth: []
tags:
  - name: calendar
  - name: changes_history
  - name: health
  - name: history
  - name: info
  - name: lists
  - name: media
  - name: search
  - name: statistics
paths:
  /api/v1/calendar/:
    get:
      tags:
        - calendar
      summary: List upcoming events of tracked media
      parameters:
        - in: query
          name: start_date
          schema:
            type: string
            format: date
          description: The start date to retrieve events for (YYYY-MM-DD)
        - in: query
          name: end_date
          schema:
            type: string
            format: date
          description: The end date to retrieve events for. If omitted with start_date, defaults to the end of that month; otherwise defaults to the end of the selected/current month (YYYY-MM-DD)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
        - in: query
          name: month
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: The month to retrieve events for (1-12). Used only if start_date is not set. Default is current month
        - in: query
          name: year
          schema:
            type: integer
          description: The year to retrieve events for. Used only if start_date is not set. Default is current year
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCalendar"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/calendar/update/:
    post:
      tags:
        - calendar
      summary: Update calendar events
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/changes_history/{media_type}/{history_id}/:
    delete:
      tags:
        - changes_history
      summary: Delete a specific changes history record by media type and history id
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: history_id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - changes_history
      summary: Retrieve a specific changes history record by media type and history id
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypesComplete"
        - in: path
          name: history_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangesHistoryRecord"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/health/:
    get:
      tags:
        - health
      summary: Health check endpoint
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/info/:
    get:
      tags:
        - info
      summary: Get application information
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
  /api/v1/lists/:
    get:
      tags:
        - lists
      summary: List the user's custom lists
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring search on list name or description
        - in: query
          name: sort
          schema:
            $ref: "#/components/schemas/ListsSortOptions"
          description: Sort order for results
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedListsNoItems"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - lists
      summary: Create a new list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateList"
            examples:
              basic:
                summary: Basic list creation
                value:
                  name: "My Favorite Movies"
                  description: "A list of my all-time favorite movies."
              detailed:
                summary: Detailed list creation
                value:
                  name: "Sci-Fi Collection"
                  description: "A curated list of the best science fiction films."
                  collaborators: [2, 5]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/lists/{list_id}/:
    delete:
      tags:
        - lists
      summary: Delete a list
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - lists
      summary: Get list details
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring search on item titles
        - in: query
          name: sort
          schema:
            $ref: "#/components/schemas/SortOptions"
          description: Sort order for results
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - lists
      summary: Edit a list
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditList"
            examples:
              basic:
                summary: Basic list editing
                value:
                  name: "My Favorite Movies"
                  description: "A list of my all-time favorite movies."
              detailed:
                summary: Detailed list editing
                value:
                  name: "Sci-Fi Collection"
                  description: "A curated list of the best science fiction films."
                  collaborators: [2, 5]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteList"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/lists/{list_id}/items/:
    get:
      tags:
        - lists
      summary: List list items
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/lists/{list_id}/items/{item_id}/:
    delete:
      tags:
        - lists
      summary: Remove an item from a list
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
        - in: path
          name: item_id
          description: Sequential item identifier scoped to the list (starts from 0).
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - lists
      summary: Get an Item from a list
      parameters:
        - in: path
          name: list_id
          required: true
          schema:
            type: integer
        - in: path
          name: item_id
          description: Sequential item identifier scoped to the list (starts from 0).
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/media/:
    get:
      tags:
        - media
      summary: List tracked media for the authenticated user
      parameters:
        - in: query
          name: exclude
          schema:
            type: string
          description: Comma-separated list of media types to exclude (excluded by default are seasons and episodes)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring search on item title
        - in: query
          name: sort
          schema:
            $ref: "#/components/schemas/SortOptions"
          description: Sort order for results
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/MediaStatus"
          description: Filter by media status
        - in: query
          name: media_type
          schema:
            $ref: "#/components/schemas/MediaTypesComplete"
          description: Filter by media type
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/media/{media_type}/:
    get:
      tags:
        - media
      summary: List tracked media of a given media type for the authenticated user
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypesComplete"
          description: Filter by media type
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 20
          description: "Maximum number of items to return (default: 20)"
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: "Offset for pagination (default: 0)"
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive substring search on item title
        - in: query
          name: sort
          schema:
            $ref: "#/components/schemas/SortOptions"
          description: Sort order for results
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/MediaStatus"
          description: Filter by media status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - media
      summary: Create a media item of a given media type
      description: |
        Create a new tracked media item. 
        For manual creations set `source` to `manual` and omit `media_id`.
        For provider creations set `source` to the provider name (eg. `tmdb`) and
        provide `media_id`. Provider metadata (title/image) will overwrite any
        existing values when creating or updating the Item.
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypesComplete"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedia"
            examples:
              manual:
                summary: Manual creation (custom item)
                value:
                  source: "manual"
                  title: "My Custom Movie"
                  image: "https://example.com/poster.jpg"
                  score: 8.5
                  status: 3
                  progress: 1
                  start_date: "2023-10-01T00:00:00Z"
                  end_date: "2023-10-01T00:00:00Z"
                  notes: "Watched at the festival"
              provider:
                summary: Provider-based creation (fetch metadata)
                value:
                  source: "tmdb"
                  media_id: "12345"
                  season_number: 1
                  score: 9
                  status: 1
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/media/{media_type}/{source}/{media_id}/:
    delete:
      tags:
        - media
      summary: Delete a media item and all its consumptions if it's tracked
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: source
          required: true
          schema:
            $ref: "#/components/schemas/Source"
        - in: path
          name: media_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - media
      summary: Retrieve a media item
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: source
          required: true
          schema:
            $ref: "#/components/schemas/Source"
        - in: path
          name: media_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMedia"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - media
      summary: Edit LAST CONSUMPTION of a media item if it's tracked
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: source
          required: true
          schema:
            $ref: "#/components/schemas/Source"
        - in: path
          name: media_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/UpdateAnime"
                - $ref: "#/components/schemas/UpdateBook"
                - $ref: "#/components/schemas/UpdateComic"
                - $ref: "#/components/schemas/UpdateGame"
                - $ref: "#/components/schemas/UpdateManga"
                - $ref: "#/components/schemas/UpdateMovie"
                - $ref: "#/components/schemas/UpdateTV"
      responses:
        "200":
          description: Updated
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/media/{media_type}/{source}/{media_id}/changes_history/:
    get:
      tags:
        - media
        - changes_history
      summary: Get changes history records for a media item
      parameters:
        - in: path
          name: media_type
          required: true
          schema:
            $ref: "#/components/schemas/MediaTypes"
        - in: path
          name: source
          required: true
          schema:
            $ref: "#/components/schemas/Source"
        - in: path
          name: media_id
          required: true
          schema:
            type: string
