name: YamtrackiOS
options:
  bundleIdPrefix: org.yamtrack
targets:
  YamtrackiOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - YamtrackiOS
    info:
      path: YamtrackiOS/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.yamtrack.ios
        SWIFT_VERSION: 6.0
    dependencies: []
  YamtrackiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - YamtrackiOSTests
    dependencies:
      - target: YamtrackiOS
  YamtrackiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - YamtrackiOSUITests
    dependencies:
      - target: YamtrackiOS
